apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openfga
  namespace: argo
spec:
  project: default

  source:
    repoURL: https://github.com/bratva-gzp/openfga.git
    targetRevision: main   # ✅ NOT latest
    path: .
    helm:
      valueFiles:
        - openfga-values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: openfga

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
